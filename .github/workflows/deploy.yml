name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew clean build -x test

    - name: Copy Files to EC2 via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/*.jar,dockerfile,compose.yaml,mosquitto/"
        target: "/home/ec2-user/app"

    - name: Execute Docker Compose on EC2
      env:
        RDS_HOST: ${{ secrets.RDS_HOST }}
        RDS_DB_NAME: ${{ secrets.RDS_DB_NAME }}
        RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        AWS_IOT_ENABLED: ${{ secrets.AWS_IOT_ENABLED }}
        AWS_IOT_ENDPOINT: ${{ secrets.AWS_IOT_ENDPOINT }}
        AWS_IOT_CLIENT_ID: ${{ secrets.AWS_IOT_CLIENT_ID }}
        AWS_IOT_PHOTO_TOPIC: ${{ secrets.AWS_IOT_PHOTO_TOPIC }}
        AWS_IOT_PHOTO_REQUEST_TOPIC: ${{ secrets.AWS_IOT_PHOTO_REQUEST_TOPIC }}
        AWS_IOT_TELEMETRY_TOPIC: ${{ secrets.AWS_IOT_TELEMETRY_TOPIC }}
        AWS_IOT_CERT_PATH: ${{ secrets.AWS_IOT_CERT_PATH }}
        AWS_IOT_PRIVATE_KEY_PATH: ${{ secrets.AWS_IOT_PRIVATE_KEY_PATH }}
        AWS_IOT_ROOT_CA_PATH: ${{ secrets.AWS_IOT_ROOT_CA_PATH }}
        AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        AWS_KVS_ENABLED: ${{ secrets.AWS_KVS_ENABLED }}
        AWS_KVS_REGION: ${{ secrets.AWS_KVS_REGION }}
        AWS_KVS_CHANNEL_NAME: ${{ secrets.AWS_KVS_CHANNEL_NAME }}
        AWS_KVS_MASTER_ROLE_ARN: ${{ secrets.AWS_KVS_MASTER_ROLE_ARN }}
        AWS_KVS_VIEWER_ROLE_ARN: ${{ secrets.AWS_KVS_VIEWER_ROLE_ARN }}
        AI_SERVER_BASE_URL: ${{ secrets.AI_SERVER_BASE_URL }}
        FCM_ENABLED: ${{ secrets.FCM_ENABLED }}
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: RDS_HOST,RDS_DB_NAME,RDS_PASSWORD,JWT_SECRET,AWS_IOT_ENABLED,AWS_IOT_ENDPOINT,AWS_IOT_CLIENT_ID,AWS_IOT_PHOTO_TOPIC,AWS_IOT_PHOTO_REQUEST_TOPIC,AWS_IOT_TELEMETRY_TOPIC,AWS_IOT_CERT_PATH,AWS_IOT_PRIVATE_KEY_PATH,AWS_IOT_ROOT_CA_PATH,AWS_S3_BUCKET,AWS_REGION,AWS_KVS_ENABLED,AWS_KVS_REGION,AWS_KVS_CHANNEL_NAME,AWS_KVS_MASTER_ROLE_ARN,AWS_KVS_VIEWER_ROLE_ARN,AI_SERVER_BASE_URL,FCM_ENABLED,FIREBASE_SERVICE_ACCOUNT_JSON
        script: |
          cd /home/ec2-user/app
          if [ -z "$JWT_SECRET" ]; then
            echo "ERROR: JWT_SECRET GitHub Secret이 비어 있습니다."
            exit 1
          fi
          if [ -z "$RDS_HOST" ] || [ -z "$RDS_PASSWORD" ]; then
            echo "ERROR: RDS_HOST, RDS_PASSWORD Secret을 확인하세요."
            exit 1
          fi
          if [ "${AWS_IOT_ENABLED:-false}" = "true" ] && [ -z "$AWS_S3_BUCKET" ]; then
            echo "ERROR: AWS_IOT_ENABLED=true 이면 AWS_S3_BUCKET Secret이 필요합니다."
            exit 1
          fi
          RDS_DB_NAME="${RDS_DB_NAME:-db-2ne1}"
          RDS_USERNAME="postgres"
          RDS_PORT="5432"
          SPRING_DATASOURCE_URL="jdbc:postgresql://${RDS_HOST}:${RDS_PORT}/${RDS_DB_NAME}"
          if [ "${FCM_ENABLED:-false}" = "true" ]; then
            if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
              echo "ERROR: FCM_ENABLED=true 이면 FIREBASE_SERVICE_ACCOUNT_JSON Secret이 필요합니다."
              exit 1
            fi
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json
            chmod 600 firebase-service-account.json
          else
            echo '{}' > firebase-service-account.json
            chmod 600 firebase-service-account.json
          fi
          printf '%s\n' \
            "SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}" \
            "SPRING_DATASOURCE_USERNAME=${RDS_USERNAME}" \
            "SPRING_DATASOURCE_PASSWORD=${RDS_PASSWORD}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "AWS_IOT_ENABLED=${AWS_IOT_ENABLED:-false}" \
            "AWS_IOT_ENDPOINT=${AWS_IOT_ENDPOINT:-amtgq6rjeeepu-ats.iot.us-east-1.amazonaws.com}" \
            "AWS_IOT_CLIENT_ID=${AWS_IOT_CLIENT_ID:-graduation-backend}" \
            "AWS_IOT_PHOTO_TOPIC=${AWS_IOT_PHOTO_TOPIC:-plants/+/status/photo}" \
            "AWS_IOT_PHOTO_REQUEST_TOPIC=${AWS_IOT_PHOTO_REQUEST_TOPIC:-plants/+/photo/request}" \
            "AWS_IOT_TELEMETRY_TOPIC=${AWS_IOT_TELEMETRY_TOPIC:-plants/+/telemetry}" \
            "AWS_IOT_CERT_PATH=${AWS_IOT_CERT_PATH:-}" \
            "AWS_IOT_PRIVATE_KEY_PATH=${AWS_IOT_PRIVATE_KEY_PATH:-}" \
            "AWS_IOT_ROOT_CA_PATH=${AWS_IOT_ROOT_CA_PATH:-}" \
            "AWS_S3_BUCKET=${AWS_S3_BUCKET:-}" \
            "AWS_REGION=${AWS_REGION:-us-east-1}" \
            "AWS_S3_KEY_PREFIX=plants" \
            "AWS_S3_PRESIGN_EXPIRATION_MINUTES=15" \
            "AWS_KVS_ENABLED=${AWS_KVS_ENABLED:-false}" \
            "AWS_KVS_REGION=${AWS_KVS_REGION:-us-east-1}" \
            "AWS_KVS_CHANNEL_NAME=${AWS_KVS_CHANNEL_NAME:-inha-capstone-07-pi-camera-channel}" \
            "AWS_KVS_MASTER_ROLE_ARN=${AWS_KVS_MASTER_ROLE_ARN:-}" \
            "AWS_KVS_VIEWER_ROLE_ARN=${AWS_KVS_VIEWER_ROLE_ARN:-}" \
            "AI_SERVER_BASE_URL=${AI_SERVER_BASE_URL:-http://100.95.251.67:30800}" \
            "FCM_ENABLED=${FCM_ENABLED:-false}" \
            "FCM_SERVICE_ACCOUNT_PATH=file:/app/firebase-service-account.json" \
            > .env
          chmod 600 .env
          echo "RDS에 데이터베이스 ${RDS_DB_NAME} 확인/생성..."
          sudo docker run --rm \
            -e PGPASSWORD="${RDS_PASSWORD}" \
            postgres:16-alpine \
            psql -h "${RDS_HOST}" -U postgres -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname = '${RDS_DB_NAME}'" | grep -q 1 || \
          sudo docker run --rm \
            -e PGPASSWORD="${RDS_PASSWORD}" \
            postgres:16-alpine \
            psql -h "${RDS_HOST}" -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE \"${RDS_DB_NAME}\""
          sudo docker compose down || true
          sudo docker compose up -d --build
          sudo docker compose ps
          echo "Spring backend logs (last 30 lines):"
          sudo docker logs spring_backend --tail 30 || true
