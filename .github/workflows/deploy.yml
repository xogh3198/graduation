name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew clean build -x test

    - name: Copy Files to EC2 via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/*.jar,dockerfile,compose.yaml,mosquitto/"
        target: "/home/ec2-user/app"

    - name: Execute Docker Compose on EC2
      env:
        RDS_HOST: ${{ secrets.RDS_HOST }}
        RDS_DB_NAME: ${{ secrets.RDS_DB_NAME }}
        RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: RDS_HOST,RDS_DB_NAME,RDS_PASSWORD,JWT_SECRET
        script: |
          cd /home/ec2-user/app
          if [ -z "$JWT_SECRET" ]; then
            echo "ERROR: JWT_SECRET GitHub Secret이 비어 있습니다."
            exit 1
          fi
          if [ -z "$RDS_HOST" ] || [ -z "$RDS_DB_NAME" ] || [ -z "$RDS_PASSWORD" ]; then
            echo "ERROR: RDS_HOST, RDS_DB_NAME, RDS_PASSWORD Secret을 확인하세요."
            exit 1
          fi
          RDS_USERNAME="postgres"
          RDS_PORT="5432"
          SPRING_DATASOURCE_URL="jdbc:postgresql://${RDS_HOST}:${RDS_PORT}/${RDS_DB_NAME}"
          printf '%s\n' \
            "SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}" \
            "SPRING_DATASOURCE_USERNAME=${RDS_USERNAME}" \
            "SPRING_DATASOURCE_PASSWORD=${RDS_PASSWORD}" \
            "JWT_SECRET=${JWT_SECRET}" \
            > .env
          chmod 600 .env
          sudo docker compose down || true
          sudo docker compose up -d --build
          sudo docker compose ps
          echo "Spring backend logs (last 30 lines):"
          sudo docker logs spring_backend --tail 30 || true
