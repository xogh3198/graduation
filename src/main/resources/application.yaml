spring:
  security:
    user:
      name: user
      password: 1234
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    com.project.graduation: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: spring-boot-backend-1
  topic: device/sensor/#

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 3600000
  refresh-expiration-ms: 604800000

app:
  init-dummy-data: ${APP_INIT_DUMMY_DATA:true}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:}
    region: ${AWS_REGION:us-east-1}
    key-prefix: ${AWS_S3_KEY_PREFIX:plants}
    presign-expiration-minutes: ${AWS_S3_PRESIGN_EXPIRATION_MINUTES:15}
  iot:
    enabled: ${AWS_IOT_ENABLED:false}
    endpoint: ${AWS_IOT_ENDPOINT:amtgq6rjeeepu-ats.iot.us-east-1.amazonaws.com}
    client-id: ${AWS_IOT_CLIENT_ID:graduation-backend}
    photo-topic: ${AWS_IOT_PHOTO_TOPIC:plants/+/status/photo}
    photo-request-topic: ${AWS_IOT_PHOTO_REQUEST_TOPIC:plants/+/photo/request}
    photo-response-topic-suffix: ${AWS_IOT_PHOTO_RESPONSE_TOPIC_SUFFIX:photo/response}
    telemetry-topic: ${AWS_IOT_TELEMETRY_TOPIC:plants/+/telemetry}
    command-topic-suffix: ${AWS_IOT_COMMAND_TOPIC_SUFFIX:command}
    certificate-path: ${AWS_IOT_CERT_PATH:}
    private-key-path: ${AWS_IOT_PRIVATE_KEY_PATH:}
    root-ca-path: ${AWS_IOT_ROOT_CA_PATH:}

ai:
  server:
    base-url: ${AI_SERVER_BASE_URL:http://100.95.251.67:30800}
    vision-path: ${AI_SERVER_VISION_PATH:/ai/v1/analyze/vision}
    death-path: ${AI_SERVER_DEATH_PATH:/ai/v1/analyze/death}

fcm:
  enabled: ${FCM_ENABLED:false}
  service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:file:/app/firebase-service-account.json}
