version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config

  backend:
    build: .
    container_name: spring_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs:ro
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MQTT_BROKER_URL: tcp://mosquitto:1883
      APP_INIT_DUMMY_DATA: ${APP_INIT_DUMMY_DATA:-true}
      AWS_IOT_ENABLED: ${AWS_IOT_ENABLED:-false}
      AWS_IOT_ENDPOINT: ${AWS_IOT_ENDPOINT:-amtgq6rjeeepu-ats.iot.us-east-1.amazonaws.com}
      AWS_IOT_CLIENT_ID: ${AWS_IOT_CLIENT_ID:-graduation-backend}
      AWS_IOT_PHOTO_TOPIC: ${AWS_IOT_PHOTO_TOPIC:-plants/+/status/photo}
      AWS_IOT_PHOTO_REQUEST_TOPIC: ${AWS_IOT_PHOTO_REQUEST_TOPIC:-plants/+/photo/request}
      AWS_IOT_PHOTO_RESPONSE_TOPIC_SUFFIX: ${AWS_IOT_PHOTO_RESPONSE_TOPIC_SUFFIX:-photo/response}
      AWS_IOT_TELEMETRY_TOPIC: ${AWS_IOT_TELEMETRY_TOPIC:-plants/+/telemetry}
      AWS_IOT_CERT_PATH: ${AWS_IOT_CERT_PATH:-}
      AWS_IOT_PRIVATE_KEY_PATH: ${AWS_IOT_PRIVATE_KEY_PATH:-}
      AWS_IOT_ROOT_CA_PATH: ${AWS_IOT_ROOT_CA_PATH:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_KEY_PREFIX: ${AWS_S3_KEY_PREFIX:-plants}
      AWS_S3_PRESIGN_EXPIRATION_MINUTES: ${AWS_S3_PRESIGN_EXPIRATION_MINUTES:-15}
      AWS_KVS_ENABLED: ${AWS_KVS_ENABLED:-false}
      AWS_KVS_REGION: ${AWS_KVS_REGION:-us-east-1}
      AWS_KVS_CHANNEL_NAME: ${AWS_KVS_CHANNEL_NAME:-inha-capstone-07-pi-camera-channel}
      AWS_KVS_MASTER_ROLE_ARN: ${AWS_KVS_MASTER_ROLE_ARN:-}
      AWS_KVS_VIEWER_ROLE_ARN: ${AWS_KVS_VIEWER_ROLE_ARN:-}
      AI_SERVER_BASE_URL: ${AI_SERVER_BASE_URL:-http://100.95.251.67:30800}
      FCM_ENABLED: ${FCM_ENABLED:-false}
      FCM_SERVICE_ACCOUNT_PATH: ${FCM_SERVICE_ACCOUNT_PATH:-file:/app/firebase-service-account.json}
    depends_on:
      - mosquitto
